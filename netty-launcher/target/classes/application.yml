server:
  port: 2310
  tomcat:
    uri-encoding: UTF-8

logging:
  config: classpath:logback.xml

spring:
  thymeleaf:
    # 开发期关闭模板缓存，方便调试；生产环境建议改回 true
    cache: true
    encoding: UTF-8

  # ============ 文件上传（控制台 jar 上传） ============
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # ============ PostgreSQL 数据源 ============
  datasource:
    url: jdbc:postgresql://localhost:5432/iot_access_hub?stringtype=unspecified
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  # ============ Flyway 自动迁移 ============
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history

# ============ MyBatis-Plus ============
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.cas.access.netty.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
#    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

netty:
  server:
    protocol:
      # 协议 jar 扫描目录（相对路径基于工作目录，可改绝对路径）
      jar-dir: ./protocols
      # 启动时是否自动扫描一次外部协议 jar
      auto-load-on-startup: true
