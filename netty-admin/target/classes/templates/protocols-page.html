<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('协议管理')"></head>
<body>

<header class="topbar">
    <div class="topbar-left">
        <div>
            <div class="page-title">协议管理</div>
            <div class="page-sub">协议的加载、卸载与端口绑定关系</div>
        </div>
    </div>
    <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openUploadModal()">
            <i class="bi bi-cloud-upload"></i> 上传协议
        </button>
        <button class="btn btn-ghost btn-sm" onclick="reloadProtocols()">
            <i class="bi bi-arrow-clockwise"></i> 重新扫描
        </button>
        <button class="btn btn-ghost btn-sm" onclick="refresh()">
            <i class="bi bi-refresh"></i> 刷新
        </button>
    </div>
</header>

<aside th:replace="fragments/layout :: sidebar('protocols')"></aside>

<main class="content">

    <!-- 统计卡片（精简） -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon-bg icon-blue"><i class="bi bi-box-seam"></i></div>
            <div class="stat-label">已加载协议</div>
            <div class="stat-value" th:text="${summary.protocolCount}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon-bg icon-purple"><i class="bi bi-file-earmark-zip"></i></div>
            <div class="stat-label">外部协议 Jar</div>
            <div class="stat-value" th:text="${summary.externalJarCount}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon-bg icon-cyan"><i class="bi bi-plug"></i></div>
            <div class="stat-label">绑定端口</div>
            <div class="stat-value" th:text="${summary.boundPortCount}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon-bg icon-green"><i class="bi bi-people"></i></div>
            <div class="stat-label">活跃连接</div>
            <div class="stat-value" th:text="${summary.totalConnections}">0</div>
        </div>
    </div>

    <!-- 协议列表（完整版） -->
    <div class="panel" style="margin-bottom: 20px;">
        <div class="panel-header">
            <div class="panel-title">
                <i class="bi bi-box-seam"></i> 已加载协议
            </div>
            <div class="panel-meta" th:text="'共 ' + ${protocols.size()} + ' 个'"></div>
        </div>
        <div class="panel-body">
            <div th:if="${protocols.empty}" class="empty">
                <i class="bi bi-inbox"></i>
                暂无已加载协议
            </div>
            <table th:unless="${protocols.empty}">
                <thead>
                <tr>
                    <th>协议</th>
                    <th>版本</th>
                    <th>来源</th>
                    <th>加载时间</th>
                    <th>状态</th>
                    <th>Jar 路径</th>
                    <th class="text-right">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${protocols}">
                    <td>
                        <div class="proto-name" th:text="${p.name}"></div>
                        <div class="proto-desc" th:if="${p.description}" th:text="${p.description}"></div>
                    </td>
                    <td><span class="code-chip" th:text="${p.version}"></span></td>
                    <td>
                        <span class="tag"
                              th:classappend="${p.source == 'builtin'} ? 'tag-builtin' : 'tag-external'"
                              th:text="${p.source == 'builtin'} ? '内置' : '外部 jar'"
                              th:title="${p.source}"></span>
                    </td>
                    <td><span class="mono text-muted" th:text="${p.loadedAtText}"></span></td>
                    <td>
                        <span class="tag tag-inactive" th:if="${!p.active}">已停用</span>
                        <span class="tag tag-active" th:unless="${!p.active}">
                             <i class="bi bi-check-circle-fill" style="font-size:10px;"></i> 活跃
                        </span>
                    </td>
<!--                    <td>-->
<!--                        <span class="mono text-muted text-small" th:if="${p.jarPath}" th:text="${p.jarPath}"></span>-->
<!--                        <span class="text-muted text-small" th:unless="${p.jarPath}">-</span>-->
<!--                    </td>-->
<!--                    <td>-->
<!--                        <span class="mono text-muted text-small" th:if="${p.jarPath}"-->
<!--                             th:text="${#strings.substringAfterLast(#strings.replace(p.jarPath,'\\','/'), '/')}"></span>-->
<!--                        <span class="text-muted text-small" th:unless="${p.jarPath}">-</span>-->
<!--                    </td>-->
                    <td>
                <span class="mono text-muted text-small" th:if="${p.jarPath}"
                            th:text="${p.jarPath.substring(p.jarPath.lastIndexOf('\\') + 1)}"></span>
                        <span class="text-muted text-small" th:unless="${p.jarPath}">-</span>
                    </td>
                    <td class="text-right">
                        <button class="btn btn-sm btn-success-ghost"
                                th:data-name="${p.name}"
                                onclick="reloadProtocol(this.dataset.name)"
                                th:if="${!p.active}"
                                th:disabled="${p.source == 'builtin'}"
                                th:title="${p.source == 'builtin'} ? '内置协议无需重新启用' : ''">
                            <i class="bi bi-play-circle"></i> 重新启用
                        </button>
                        <button class="btn btn-sm btn-primary-ghost"
                                th:data-name="${p.name}"
                                onclick="openUpdateModal(this.dataset.name)"
                                th:if="${p.active && p.source != 'builtin'}">
                            <i class="bi bi-arrow-repeat"></i> 更新
                        </button>
                        <button class="btn btn-sm btn-danger-ghost"
                                th:data-name="${p.name}"
                                onclick="unloadProtocol(this.dataset.name)"
                                th:unless="${!p.active}"
                                th:disabled="${p.source == 'builtin'}"
                                th:title="${p.source == 'builtin'} ? '内置协议不可卸载' : ''">
                            <i class="bi bi-trash3"></i> 卸载
                        </button>
                        <button class="btn btn-sm btn-danger"
                                th:data-name="${p.name}"
                                onclick="purgeProtocol(this.dataset.name)"
                                th:if="${!p.active}"
                                th:title="'彻底删除协议[' + ${p.name} + ']的数据库记录（不可恢复）'">
                            <i class="bi bi-trash3-fill"></i> 删除
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 操作日志 -->
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title">
                <i class="bi bi-terminal"></i> 操作日志
            </div>
            <button class="btn btn-ghost btn-sm" onclick="clearOpsLog()">
                <i class="bi bi-eraser"></i> 清空
            </button>
        </div>
        <div class="ops-log" id="ops-log">
            <div class="log-line">
                <span class="log-time">--</span>
                <span class="log-msg info">暂无操作记录</span>
            </div>
        </div>
    </div>
</main>

<!-- 上传协议 Modal -->
<div id="upload-modal" class="modal-mask hidden">
    <div class="modal-box">
        <div class="modal-head">
            <h3><i class="bi bi-cloud-upload"></i> 上传协议 Jar</h3>
            <button class="modal-close" onclick="closeUploadModal()" aria-label="关闭">&times;</button>
        </div>
        <form id="upload-form" onsubmit="uploadProtocol(event)">
            <label class="field">
                <span class="field-label">Jar 文件 <span class="req">*</span></span>
                <input type="file" id="upload-file" accept=".jar" name="file" required
                       onchange="onFilePicked(event)">
                <span class="field-hint">仅支持 .jar，最大 50MB</span>
            </label>
            <label class="field">
                <span class="field-label">协议名 <span class="req">*</span></span>
                <input type="text" id="upload-name" name="protocolName"
                       placeholder="如 echo，需与 jar 内 SPI 声明一致" required>
            </label>
            <label class="field">
                <span class="field-label">监听端口 <span class="req">*</span></span>
                <input type="number" id="upload-port" name="port"
                       min="1024" max="65535" placeholder="1024-65535" required>
                <span class="field-hint">端口必须未被其他协议占用</span>
            </label>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost btn-sm" onclick="closeUploadModal()">取消</button>
                <button type="submit" class="btn btn-primary btn-sm" id="upload-submit">
                    <i class="bi bi-box-arrow-in-down"></i> 上传并绑定
                </button>
            </div>
        </form>
    </div>
</div>

<!-- 更新协议 Modal -->
<div id="update-modal" class="modal-mask hidden">
    <div class="modal-box">
        <div class="modal-head">
            <h3><i class="bi bi-arrow-repeat"></i> 更新协议 Jar</h3>
            <button class="modal-close" onclick="closeUpdateModal()" aria-label="关闭">&times;</button>
        </div>
        <form id="update-form" onsubmit="updateProtocol(event)">
            <input type="hidden" id="update-name">
            <div class="field" style="margin-bottom: 14px;">
                <span class="field-label">协议名</span>
                <div id="update-name-display" style="font-weight: 600; font-size: 14px; padding: 6px 0;"></div>
            </div>
            <label class="field">
                <span class="field-label">新版本 Jar 文件 <span class="req">*</span></span>
                <input type="file" id="update-file" accept=".jar" name="file" required>
                <span class="field-hint">上传新版本 jar 覆盖旧版本，将自动热替换（旧连接会被断开）</span>
            </label>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost btn-sm" onclick="closeUpdateModal()">取消</button>
                <button type="submit" class="btn btn-primary btn-sm" id="update-submit">
                    <i class="bi bi-arrow-repeat"></i> 更新
                </button>
            </div>
        </form>
    </div>
</div>

<div th:replace="fragments/layout :: toasts"></div>
<th:block th:replace="fragments/layout :: scripts"></th:block>

<script>
    function reloadProtocols() {
        callApi('POST', '/protocols/reload', '已重新扫描 protocols 目录');
    }

    function unloadProtocol(name) {
        if (!confirm('确定卸载协议「' + name + '」？\n该协议绑定的所有端口将被关闭、所有活跃连接将被强制断开。')) return;
        callApi('DELETE', '/protocols/' + encodeURIComponent(name), '协议 ' + name + ' 已卸载');
    }

    function purgeProtocol(name) {
        if (!confirm('确定彻底删除协议「' + name + '」？\n\n此操作将物理删除数据库记录，不可恢复！\n如需保留记录以便后续重新启用，请改用「卸载」。')) return;
        fetch('/protocols/' + encodeURIComponent(name) + '/purge', {method: 'DELETE'})
            .then(function (r) { return r.json(); })
            .then(function (j) {
                if (j.success) {
                    showToast('协议「' + name + '」已彻底删除', 'success');
                    logOp('彻底删除协议 ' + name, 'success');
                    setTimeout(function () { location.reload(); }, 1000);
                } else {
                    showToast(j.reason || '删除失败', 'error');
                    logOp('删除失败: ' + (j.reason || '未知错误'), 'error');
                }
            })
            .catch(function (err) {
                showToast('请求异常: ' + err.message, 'error');
            });
    }

    function reloadProtocol(name) {
        if (!confirm('确定重新启用协议「' + name + '」？\n将重新加载 jar 包并启动端口监听。')) return;
        fetch('/protocols/reload/' + encodeURIComponent(name), {method: 'POST'})
            .then(function (r) {
                return r.json();
            })
            .then(function (j) {
                if (j.result === 'ok' || j.success) {
                    showToast('协议「' + name + '」已重新启用', 'success');
                    logOp('重新启用协议 ' + name, 'success');
                    setTimeout(function () {
                        location.reload();
                    }, 1000);
                } else {
                    showToast(j.reason || j.message || '重新启用失败', 'error');
                    logOp('重新启用失败: ' + (j.reason || j.message || '未知错误'), 'error');
                }
            })
            .catch(function (err) {
                showToast('请求异常: ' + err.message, 'error');
            });
    }

    function refresh() {
        location.reload();
    }

    /* ========== 上传协议 Modal ========== */
    function openUploadModal() {
        document.getElementById('upload-form').reset();
        document.getElementById('upload-modal').classList.remove('hidden');
    }

    function closeUploadModal() {
        document.getElementById('upload-modal').classList.add('hidden');
    }

    // 点击遮罩关闭
    document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('upload-modal').addEventListener('click', function (e) {
            if (e.target === this) closeUploadModal();
        });
    });

    // 用户选完 jar 后，自动用文件名预填协议名（如 echo-protocol-1.0.jar → echo）
    function onFilePicked(e) {
        var f = e.target.files[0];
        if (!f) return;
        var base = f.name.replace(/\.jar$/i, '');
        // 截断第一个 - 或 _ 之前的部分作为协议名建议
        var suggested = base.split(/[-_]/)[0];
        var nameInput = document.getElementById('upload-name');
        if (!nameInput.value) nameInput.value = suggested;
    }

    function uploadProtocol(e) {
        e.preventDefault();
        var form = e.target;
        var fd = new FormData(form);
        var submitBtn = document.getElementById('upload-submit');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> 上传中...';
        fetch('/protocols/upload', {method: 'POST', body: fd})
            .then(function (r) {
                return r.json();
            })
            .then(function (j) {
                if (j.success) {
                    closeUploadModal();
                    showToast('协议「' + j.protocolName + '」已加载并绑定到端口 ' + j.port, 'success');
                    logOp('上传协议 ' + j.protocolName + ' v' + j.version + ' → 端口 ' + j.port, 'success');
                    setTimeout(function () {
                        location.reload();
                    }, 1000);
                } else {
                    showToast(j.reason || '上传失败', 'error');
                    logOp('上传失败: ' + (j.reason || '未知错误'), 'error');
                }
            })
            .catch(function (err) {
                showToast('请求异常: ' + err.message, 'error');
            })
            .finally(function () {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-box-arrow-in-down"></i> 上传并绑定';
            });
    }

    /* ========== 更新协议 Modal ========== */
    function openUpdateModal(name) {
        document.getElementById('update-form').reset();
        document.getElementById('update-name').value = name;
        document.getElementById('update-name-display').textContent = name;
        document.getElementById('update-modal').classList.remove('hidden');
    }

    function closeUpdateModal() {
        document.getElementById('update-modal').classList.add('hidden');
    }

    document.addEventListener('DOMContentLoaded', function () {
        var modal = document.getElementById('update-modal');
        if (modal) {
            modal.addEventListener('click', function (e) {
                if (e.target === this) closeUpdateModal();
            });
        }
    });

    function updateProtocol(e) {
        e.preventDefault();
        var name = document.getElementById('update-name').value;
        var form = e.target;
        var fd = new FormData(form);
        var submitBtn = document.getElementById('update-submit');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> 更新中...';
        fetch('/protocols/' + encodeURIComponent(name) + '/update', {method: 'POST', body: fd})
            .then(function (r) { return r.json(); })
            .then(function (j) {
                if (j.success) {
                    closeUpdateModal();
                    showToast('协议「' + j.protocolName + '」已更新到 v' + j.version, 'success');
                    logOp('更新协议 ' + j.protocolName + ' v' + j.version + ' → 端口 ' + (j.reboundPorts || []), 'success');
                    setTimeout(function () { location.reload(); }, 1000);
                } else {
                    showToast(j.reason || '更新失败', 'error');
                    logOp('更新失败: ' + (j.reason || '未知错误'), 'error');
                }
            })
            .catch(function (err) {
                showToast('请求异常: ' + err.message, 'error');
            })
            .finally(function () {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-arrow-repeat"></i> 更新';
            });
    }
</script>
</body>
</html>
